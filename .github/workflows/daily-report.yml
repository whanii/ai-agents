name: Daily AI Trend Report

on:
  workflow_dispatch:
  schedule:
    - cron: "50 6 * * *"
      timezone: "Asia/Seoul"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: daily-report-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ai-agent-trends

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run report pipeline
        run: python scripts/run_pipeline.py

      - name: Build GitHub Pages site
        run: python scripts/build_pages.py

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ai-agent-trends/site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
